<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 图片生成</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: #222;
    background: #fafafa;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 24px; }

  label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  textarea, input, select {
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    color: #222;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
  }
  textarea { min-height: 100px; resize: vertical; }
  textarea:focus, input:focus, select:focus { border-color: #888; }

  .field { margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 12px; margin-bottom: 14px; }

  .hint { font-size: 12px; color: #888; margin-top: 6px; }

  details { margin: 6px 0 16px; }
  details summary { cursor: pointer; font-size: 13px; color: #666; user-select: none; padding: 4px 0; }
  details[open] summary { margin-bottom: 10px; }

  button {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    background: #222;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #000; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #status {
    margin-top: 14px;
    font-size: 13px;
    color: #666;
    min-height: 18px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #status.err { color: #c0392b; }

  #results { margin-top: 24px; display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .card { border: 1px solid #e4e4e4; border-radius: 6px; overflow: hidden; background: #fff; }
  .card img { width: 100%; display: block; }
  .card .bar { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #888; }
  .card a { color: #222; text-decoration: none; font-weight: 500; }
  .card a:hover { text-decoration: underline; }

  .ref-preview { margin-top: 8px; display: flex; align-items: center; gap: 12px; }
  .ref-preview img { width: 96px; height: 96px; object-fit: cover; border: 1px solid #e4e4e4; border-radius: 6px; background: #fff; }
  .ref-clear { width: auto; padding: 6px 12px; font-size: 12px; background: #fff; color: #666; border: 1px solid #ddd; }
  .ref-clear:hover:not(:disabled) { background: #f5f5f5; color: #222; }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI 图片生成</h1>

  <div class="field">
    <label>参考图（可选）</label>
    <input type="file" id="refImage" accept="image/*">
    <div id="refPreview" class="ref-preview" hidden>
      <img id="refPreviewImg" alt="">
      <button type="button" id="refClear" class="ref-clear">移除</button>
    </div>
    <div class="hint">上传后走图生图，prompt 描述要做的修改；不传则按 prompt 生图。建议 ≤ 10MB，最大 25MB。</div>
  </div>

  <div class="field">
    <label>Prompt</label>
    <textarea id="prompt" placeholder="描述想生成的图像……"></textarea>
    <div class="hint">按 Cmd / Ctrl + Enter 提交</div>
  </div>

  <div class="row">
    <div>
      <label>尺寸</label>
      <select id="size">
        <option value="auto">auto</option>
        <option value="1024x1024" selected>1024×1024</option>
        <option value="1536x1024">1536×1024</option>
        <option value="1024x1536">1024×1536</option>
        <option value="1792x1024">1792×1024</option>
        <option value="1024x1792">1024×1792</option>
        <option value="1280x1280">1280×1280</option>
        <option value="2048x2048">2048×2048</option>
        <option value="512x512">512×512</option>
        <option value="256x256">256×256</option>
      </select>
    </div>
    <div>
      <label>质量</label>
      <select id="quality">
        <option value="auto" selected>auto</option>
        <option value="high">high</option>
        <option value="medium">medium</option>
        <option value="low">low</option>
      </select>
    </div>
    <div>
      <label>张数</label>
      <input type="number" id="n" min="1" max="1" value="1">
    </div>
  </div>
  <div class="row">
    <div>
      <label>背景</label>
      <select id="background">
        <option value="auto" selected>auto</option>
        <option value="transparent">transparent</option>
        <option value="opaque">opaque</option>
      </select>
    </div>
    <div>
      <label>输出格式</label>
      <select id="outputFormat">
        <option value="png" selected>png</option>
        <option value="jpeg">jpeg</option>
        <option value="webp">webp</option>
      </select>
    </div>
  </div>
  <button id="go">生成</button>
  <div id="status"></div>

  <div id="results"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const btn = $("go"), statusEl = $("status"), resultsEl = $("results");
const CONFIG = {
  appConfigPath: "app-config.json",
  apiPath: "api/images/generations",
  editsPath: "api/images/edits",
  uploadPath: "api/upload",
  model: "gpt-image-2",
  responseFormat: "b64_json",
};
const MAX_REF_BYTES = 25 * 1024 * 1024;
const STORAGE_KEY = "picklyone-image-ui-v3";

restoreForm();
bindPersistence();
loadConfig();

async function go() {
  const prompt = $("prompt").value.trim();
  if (!prompt) { setStatus("请输入 prompt", true); return; }

  const refFile = $("refImage").files[0] || null;
  if (refFile && refFile.size > MAX_REF_BYTES) {
    setStatus(`参考图过大（${(refFile.size / 1024 / 1024).toFixed(1)}MB），请控制在 25MB 以内`, true);
    return;
  }

  const body = {
    model: CONFIG.model,
    prompt,
    size: $("size").value,
    quality: $("quality").value,
    background: $("background").value,
    output_format: $("outputFormat").value,
    response_format: CONFIG.responseFormat,
    n: Math.min(1, Math.max(1, parseInt($("n").value, 10) || 1)),
  };

  btn.disabled = true;
  btn.textContent = "生成中…";
  resultsEl.innerHTML = "";

  const t0 = Date.now();
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 300000);
  try {
    let url = CONFIG.apiPath;
    if (refFile) {
      setStatus("上传参考图……");
      const imageKey = await uploadReferenceImage(refFile, ctrl.signal);
      body.image_key = imageKey;
      url = CONFIG.editsPath;
    }
    setStatus("生成中……");

    const postJson = () => fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
    let res = await postJson();
    if (res.status === 409 && refFile) {
      await new Promise(r => setTimeout(r, 1500));
      res = await postJson();
    }
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); }
    catch { throw new Error("HTTP " + res.status + "\n" + text.slice(0, 400)); }
    if (!res.ok) {
      const code = json?.error?.code || "";
      const message = json?.error?.message || json?.message || text;
      const friendly = getFriendlyErrorMessage(res.status, code, message);
      throw new Error(friendly || ("HTTP " + res.status + "：" + message + (code ? " (" + code + ")" : "")));
    }
    if (!json.data?.length) throw new Error("响应无 data 字段\n" + text.slice(0, 400));

    const rendered = render(json.data, prompt, body.output_format);
    if (!rendered) {
      throw new Error(
        "接口已返回 data，但没有可渲染的图片字段。当前实测建议使用 response_format=b64_json。"
      );
    }
    setStatus(`完成 · ${rendered} 张 · ${((Date.now()-t0)/1000).toFixed(1)}s`);
  } catch (err) {
    console.error("[gpt-image-2] fetch failed:", err, "cause:", err.cause);
    let msg;
    if (err.name === "AbortError") {
      msg = `超过 300s 未返回，已中断 · 用时 ${((Date.now()-t0)/1000).toFixed(1)}s`;
    } else {
      const parts = [
        `${err.name || "Error"}: ${err.message || String(err)}`,
        err.cause ? `cause: ${err.cause.code || err.cause.message || String(err.cause)}` : null,
        `online: ${navigator.onLine} · 用时 ${((Date.now()-t0)/1000).toFixed(1)}s`,
        "如果是 Failed to fetch，请确认服务已启动：node server.js",
        "真正的 net::ERR_* 看 DevTools → Network 那条请求的 Status 列",
      ].filter(Boolean);
      msg = parts.join("\n");
    }
    setStatus(msg, true);
  } finally {
    clearTimeout(timer);
    btn.disabled = false;
    btn.textContent = "生成";
  }
}

function setStatus(text, isErr) {
  statusEl.textContent = text;
  statusEl.classList.toggle("err", !!isErr);
}

function render(data, prompt, outputFormat) {
  const slug = prompt.slice(0, 24).replace(/[\s\\/:*?"<>|]+/g, "_");
  const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  const ext = outputFormat === "jpeg" ? "jpg" : outputFormat || "png";
  const mime = outputFormat === "jpeg" ? "image/jpeg" : outputFormat === "webp" ? "image/webp" : "image/png";
  let rendered = 0;
  data.forEach((item, i) => {
    const src = item.b64_json ? `data:${mime};base64,${item.b64_json}` : item.url;
    if (!src) return;
    const filename = `${slug}_${ts}_${i+1}.${ext}`;
    const revised = item.revised_prompt ? `<span title="${escapeHtml(item.revised_prompt)}">prompt 已优化</span>` : `<span>#${i+1}</span>`;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${src}" alt="">
      <div class="bar">
        ${revised}
        <a href="${src}" download="${filename}">下载</a>
      </div>`;
    resultsEl.appendChild(card);
    rendered += 1;
  });
  return rendered;
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function uploadReferenceImage(file, signal) {
  const form = new FormData();
  form.append("files", file, file.name || "reference");
  const res = await fetch(CONFIG.uploadPath, { method: "POST", body: form, signal });
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); }
  catch { throw new Error("上传失败：HTTP " + res.status + "\n" + text.slice(0, 400)); }
  if (!res.ok) {
    const code = json?.error?.code || "";
    const message = json?.error?.message || json?.message || text;
    const friendly = getFriendlyErrorMessage(res.status, code, message);
    throw new Error(friendly || ("上传失败：HTTP " + res.status + "：" + message + (code ? " (" + code + ")" : "")));
  }
  const key = json?.uploaded?.[0]?.key;
  if (!key) throw new Error("上传响应缺少 key 字段\n" + text.slice(0, 400));
  return key;
}

function getFriendlyErrorMessage(status, code, message) {
  if (code === "NO_GATEWAY_AVAILABLE") {
    return "图片服务暂时繁忙，请稍后再试。";
  }
  if (code === "upstream_error" || status === 502 || status === 503) {
    return "图片生成服务暂时不稳定，请稍后重试。";
  }
  if (code === "MODEL_ACCESS_DENIED") {
    return "当前图片模型暂时不可用，请稍后再试。";
  }
  if (code === "invalid_api_key" || status === 401) {
    return "服务鉴权失败，请联系管理员检查接口配置。";
  }
  if (code === "insufficient_balance" || status === 402) {
    return "服务余额不足，请联系管理员充值后再试。";
  }
  if (code === "IMAGE_TOO_LARGE") {
    return "参考图过大，请控制在 25MB 以内（建议 ≤ 10MB）。";
  }
  if (code === "IMAGE_TYPE_UNSUPPORTED") {
    return "参考图格式不支持，请使用 JPG / PNG / WebP。";
  }
  if (code === "content_policy_violation") {
    return "内容审核未通过，请调整 prompt 或参考图后重试。";
  }
  return "";
}

function restoreForm() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    if (saved.prompt) $("prompt").value = saved.prompt;
    if (saved.size) $("size").value = saved.size;
    if (saved.quality) $("quality").value = saved.quality;
    if (saved.background) $("background").value = saved.background;
    if (saved.outputFormat) $("outputFormat").value = saved.outputFormat;
  } catch (_) {}
}

function bindPersistence() {
  ["prompt", "size", "quality", "background", "outputFormat"].forEach(id => {
    $(id).addEventListener(id === "prompt" ? "input" : "change", persistForm);
  });
}

function persistForm() {
  const data = {
    prompt: $("prompt").value,
    size: $("size").value,
    quality: $("quality").value,
    background: $("background").value,
    outputFormat: $("outputFormat").value,
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (_) {}
}

async function loadConfig() {
  try {
    const res = await fetch(CONFIG.appConfigPath, { cache: "no-store" });
    if (!res.ok) return;
    const json = await res.json();
    if (json?.imageModel) {
      CONFIG.model = json.imageModel;
    }
  } catch (_) {}
}

btn.addEventListener("click", go);
$("prompt").addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") go();
});

const refInput = $("refImage");
const refPreview = $("refPreview");
const refPreviewImg = $("refPreviewImg");
let refPreviewUrl = "";

refInput.addEventListener("change", () => {
  const file = refInput.files[0];
  if (refPreviewUrl) { URL.revokeObjectURL(refPreviewUrl); refPreviewUrl = ""; }
  if (file) {
    refPreviewUrl = URL.createObjectURL(file);
    refPreviewImg.src = refPreviewUrl;
    refPreview.hidden = false;
  } else {
    refPreviewImg.removeAttribute("src");
    refPreview.hidden = true;
  }
});

$("refClear").addEventListener("click", () => {
  refInput.value = "";
  refInput.dispatchEvent(new Event("change"));
});
</script>
</body>
</html>
